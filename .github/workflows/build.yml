name: Build and Export

on:
  push:
    branches: [ "main", "dev" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=6144 # 6GB RAM
      
    steps:
      - uses: actions/checkout@v4

      - name: Debug initial files
        run: |
          echo "=== Files after checkout ==="
          ls -la
          echo "=== .env content ==="
          cat .env || echo "No .env file"
      
      - name: Setup Node.js and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'  # Sửa thành cache yarn

      - name: Install Yarn globally
        run: npm install -g yarn

      - name: Generate yarn.lock if missing
        run: |
          if [ ! -f yarn.lock ]; then
            yarn install
          fi
      
      - name: Install dependencies
        run: |
          yarn install --frozen-lockfile
          yarn cache clean
      
      - name: Build project
        run: yarn build  # Sử dụng yarn thay npm

      - name: Debug files after build
        run: |
          echo "=== Files after build ==="
          ls -la
          echo "=== .env content ==="
          cat .env || echo "No .env file after build"
        
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: |
            dist/
            package.json
            yarn.lock
          include-hidden-files: true
          retention-days: 1
          
  deploy:
    runs-on: ubuntu-latest
    environment: globals
    needs: build
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist-${{ github.ref_name }}
          
      - name: Verify downloaded files
        run: ls -la dist-${{ github.ref_name }}/
        
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Save SSH private key to file
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Disable strict host key checking
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tUserKnownHostsFile=/dev/null" > ~/.ssh/config
          chmod 600 ~/.ssh/config
          
      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync
          
      - name: Test SSH connection
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes $SERVER_USER@$SERVER_IP "echo 'SSH connection successful'"
          
      - name: Deploy with rsync
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          # Set deploy path based on branch
          if [ "$BRANCH_NAME" = "main" ]; then
            DEPLOY_PATH="/root/devops-study-nestjs-002/main"
            PM2_NAME="devops-study-nestjs-002-main"
            PORT=37102
          elif [ "$BRANCH_NAME" = "dev" ]; then
            DEPLOY_PATH="/root/devops-study-nestjs-002/dev"
            PM2_NAME="devops-study-nestjs-002-dev"
            PORT=37101
          else
            echo "Unknown branch: $BRANCH_NAME"
            exit 1
          fi
          
          echo "Deploying branch $BRANCH_NAME to $SERVER_IP:$DEPLOY_PATH"
          
          # Create backup directory on server
          ssh -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_IP \
            "mkdir -p $DEPLOY_PATH/backups"
          
          # Create backup of current dist (if exists)
          ssh -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_IP \
            "if [ -d '$DEPLOY_PATH/dist' ]; then \
              backup_dir='$DEPLOY_PATH/backups/dist-backup-$(date +%Y%m%d-%H%M%S)'; \
              cp -r '$DEPLOY_PATH/dist' \"\$backup_dir\"; \
              echo \"Backup created: \$backup_dir\"; \
            fi"
          
          # Deploy using rsync
          echo "Syncing files with rsync..."
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist-$BRANCH_NAME/ \
            $SERVER_USER@$SERVER_IP:$DEPLOY_PATH/
          
          # Set proper permissions on server
          ssh -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_IP \
            "chmod -R 755 $DEPLOY_PATH/ && \
            chown -R $SERVER_USER:$SERVER_USER $DEPLOY_PATH/"

          # Restart application with PM2
          ssh -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_IP << PM2_EOF
            echo "Starting application with PM2 on port \$PORT..."
            cd $DEPLOY_PATH && git pull

            # Load nvm properly for non-interactive shell
            export NVM_DIR="\$HOME/.nvm"
            [ -s "\$NVM_DIR/nvm.sh" ] && \\. "\$NVM_DIR/nvm.sh"
            [ -s "\$NVM_DIR/bash_completion" ] && \\. "\$NVM_DIR/bash_completion"

            nvm use 20
            #yarn install --production --frozen-lockfile
            yarn

            echo "RUN START------"

            if [ -f "dist/main.js" ]; then
                # Set port based on branch
                if [ "$BRANCH_NAME" = "main" ]; then
                    PORT=37102
                elif [ "$BRANCH_NAME" = "dev" ]; then
                    PORT=37101
                else
                    echo "Unknown branch: $BRANCH_NAME"
                    exit 1
                fi

                # Use PM2 reload with --update-env to refresh environment variables
                PORT=\$PORT pm2 reload "$PM2_NAME" --update-env 2>/dev/null || \
                  PORT=\$PORT pm2 start dist/main.js --name "$PM2_NAME"
                echo "PM2 reloaded successfully with updated environment variables on port \$PORT"
            else
                echo "ERROR: dist/main.js not found in \$(pwd)"
                ls -la dist/
                exit 1
            fi
          PM2_EOF
          
          # Cleanup old backups (keep last 5)
          ssh -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_IP \
            "cd $DEPLOY_PATH/backups && \
            ls -dt dist-backup-* 2>/dev/null | tail -n +6 | xargs rm -rf 2>/dev/null || true"
          
          echo "Deployment completed successfully! Application restarted with PM2."